server {
    listen 80;
    server_name opencloset.jihongeek.com;

    # Let's Encrypt 인증서 발급/갱신용 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 HTTP 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name opencloset.jihongeek.com;

    # SSL 인증서 경로
    ssl_certificate /etc/letsencrypt/live/opencloset.jihongeek.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opencloset.jihongeek.com/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Spring Boot 리버스 프록시
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
